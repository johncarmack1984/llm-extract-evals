name: CI

on:
  push:
    branches: [main]
  pull_request:

# No job uses the token; least-privilege read is all checkout needs.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Unit tests
        run: bun test
      - name: Eval (replays committed fixtures -- no API key required)
        env:
          REPLAY_ONLY: "1" # fail loudly on a missing fixture instead of attempting a live call
        run: bun run eval
